<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cico — Portal cliente</title>
<link rel="manifest" href="manifest.json">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

.topbar { background: #1e293b; border-bottom: 1px solid #334155; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
.topbar-logo { font-size: 1.2rem; font-weight: 800; color: #f1f5f9; letter-spacing: -1px; }
.topbar-logo span { color: #3b82f6; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-user { font-size: .82rem; color: #64748b; }

.tabs { display: flex; gap: 0; border-bottom: 1px solid #334155; background: #1e293b; padding: 0 24px; overflow-x: auto; }
.tab { padding: 12px 18px; font-size: .88rem; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s; }
.tab:hover { color: #e2e8f0; }
.tab.active { color: #60a5fa; border-bottom-color: #3b82f6; font-weight: 600; }

.content { padding: 24px; max-width: 1000px; margin: 0 auto; }

.stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 18px 20px; }
.stat-label { font-size: .72rem; color: #64748b; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
.stat-value { font-size: 1.8rem; font-weight: 700; color: #f1f5f9; }
.stat-value.blue { color: #60a5fa; }
.stat-value.green { color: #4ade80; }
.stat-value.yellow { color: #facc15; }

.card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { padding: 10px 14px; text-align: left; font-size: .72rem; color: #64748b; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #334155; background: #0f172a; white-space: nowrap; }
td { padding: 11px 14px; font-size: .88rem; border-bottom: 1px solid #1e293b; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
.empty { text-align: center; color: #475569; padding: 36px; font-size: .88rem; }

.badge { display: inline-block; padding: 3px 9px; border-radius: 100px; font-size: .72rem; font-weight: 600; }
.badge-blue   { background: #1d3a6e; color: #60a5fa; }
.badge-green  { background: #14532d; color: #4ade80; }
.badge-yellow { background: #422006; color: #facc15; }
.badge-gray   { background: #1e293b; color: #64748b; border: 1px solid #334155; }

.btn { padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: .85rem; font-weight: 600; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
.btn-ghost:hover { background: #263045; color: #e2e8f0; }
.btn-sm { padding: 4px 9px; font-size: .78rem; }
.btn-danger { background: #dc2626; color: #fff; }
.btn-danger:hover { background: #b91c1c; }

.progress-bar { background: #334155; border-radius: 100px; height: 8px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 100px; background: #3b82f6; }
.progress-fill.warn { background: #facc15; }
.progress-fill.danger { background: #f87171; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 26px; width: 520px; max-width: 100%; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 18px; color: #f1f5f9; }
.form-group { margin-bottom: 13px; }
.form-group label { display: block; font-size: .78rem; color: #94a3b8; margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 9px 12px; background: #0f172a; border: 1px solid #334155;
  border-radius: 8px; color: #f1f5f9; font-size: .88rem; outline: none; transition: border-color .2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #3b82f6; }
.form-group textarea { resize: vertical; min-height: 65px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; flex-wrap: wrap; }

@media (max-width: 640px) {
  .content { padding: 12px; }
  .topbar { padding: 12px 14px; }
  .tabs { padding: 0 8px; }
  .tab { padding: 10px 12px; font-size: .82rem; }
  .card { overflow-x: auto; }
  table { min-width: 420px; }
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal { width: 100% !important; max-width: 100% !important; border-radius: 16px 16px 0 0 !important; max-height: 92vh !important; padding: 20px 16px; }
  [style*="grid-template-columns:repeat(3"] { grid-template-columns: repeat(2,1fr) !important; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Ci<span>co</span></div>
  <div class="topbar-right">
    <span class="topbar-user" id="user-name"></span>
    <button class="btn btn-ghost btn-sm" onclick="auth.signOut()">Salir</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('dashboard')">Dashboard</div>
  <div class="tab" onclick="showTab('packages')">Bolsas de horas</div>
  <div class="tab" onclick="showTab('incidents')">Incidencias</div>
  <div class="tab" onclick="showTab('invoices')">Recibos de pago</div>
</div>

<div class="content" id="content"><div class="empty">Cargando...</div></div>

<!-- Request package modal -->
<div class="modal-overlay" id="modal-request-pkg">
  <div class="modal" style="width:400px">
    <h2>Solicitar bolsa de horas</h2>
    <div class="form-group"><label>Etiqueta (opcional)</label><input id="req-pkg-label" placeholder="Bolsa mantenimiento Julio 2025"></div>
    <div class="form-group"><label>Horas estimadas *</label><input type="number" id="req-pkg-hours" placeholder="10" step="0.5" min="1"></div>
    <div class="form-group"><label>Notas</label><textarea id="req-pkg-notes" rows="2" placeholder="¿Para qué necesitas las horas?"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-request-pkg')">Cancelar</button>
      <button class="btn btn-primary" onclick="submitPkgRequest()">Enviar solicitud</button>
    </div>
  </div>
</div>

<!-- Invoice view modal -->
<div class="modal-overlay" id="modal-invoice-view">
  <div class="modal" style="width:680px;background:#fff;color:#111">
    <div id="invoice-print-content"></div>
    <div class="modal-actions" style="border-top:1px solid #ddd;padding-top:14px;margin-top:14px">
      <button class="btn btn-ghost" style="color:#334155;border-color:#334155" onclick="closeModal('modal-invoice-view')">Cerrar</button>
      <button class="btn btn-primary" onclick="window.print()">🖨 Imprimir / PDF</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD0jmTWvghH4m8bgekx996LiSpgQoWg_IQ",
  authDomain: "cico-44dc3.firebaseapp.com",
  projectId: "cico-44dc3",
  storageBucket: "cico-44dc3.firebasestorage.app",
  messagingSenderId: "132860233789",
  appId: "1:132860233789:web:435db04a7974cd7208c254"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
const FS   = firebase.firestore;

let _user = null, _clientId = null, _clientData = null;

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  const snap = await db.collection('users').doc(user.uid).get();
  if (!snap.exists || snap.data().role !== 'client') { await auth.signOut(); window.location.href = 'index.html'; return; }
  _user = user;
  _clientId = snap.data().clientId;
  document.getElementById('user-name').textContent = snap.data().name || user.email;
  const cs = await db.collection('clients').doc(_clientId).get();
  _clientData = cs.data();
  showTab('dashboard');
});

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['dashboard','packages','incidents','invoices'][i] === tab);
  });
  const fns = { dashboard: renderDashboard, packages: renderPackages, incidents: renderIncidents, invoices: renderInvoices };
  fns[tab]();
}

function fmtEur(v)   { const n = parseFloat(v); return (isNaN(n)?0:n).toFixed(2).replace('.',',') + ' €'; }
function fmtHours(h) { const n = parseFloat(h); return (isNaN(n)?0:n).toFixed(2) + ' h'; }
function fmtDate(d) {
  if (!d) return '—';
  const ts = d && d.toDate ? d.toDate() : new Date(d);
  if (isNaN(ts)) return '—';
  return ts.toLocaleDateString('es-ES', { day:'2-digit', month:'2-digit', year:'numeric' });
}
function incStatusBadge(s) {
  if (s==='in_progress') return '<span class="badge badge-blue">🔧 En revisión</span>';
  if (s==='resolved')    return '<span class="badge badge-green">✅ Resuelto</span>';
  return '<span class="badge badge-yellow">⏳ Pendiente</span>';
}
function invStatusBadge(s) {
  if (s==='sent') return '<span class="badge badge-yellow">📤 Enviado</span>';
  if (s==='paid') return '<span class="badge badge-green">✅ Cobrado</span>';
  return '<span class="badge badge-gray">📝 Borrador</span>';
}

// ── Dashboard ──────────────────────────────────────────────────────────────────
async function renderDashboard() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="empty">Cargando...</div>';
  const [incSnap, pkgSnap, invSnap] = await Promise.all([
    db.collection('incidents').where('clientId','==',_clientId).get(),
    db.collection('hourPackages').where('clientId','==',_clientId).get(),
    db.collection('invoices').where('clientId','==',_clientId).get()
  ]);
  const incs = incSnap.docs.map(d => ({id:d.id,...d.data()}));
  const pkgs = pkgSnap.docs.map(d => ({id:d.id,...d.data()}));
  const invs = invSnap.docs.map(d => ({id:d.id,...d.data()}));

  const incPending   = incs.filter(i => i.status==='pending').length;
  const incProgress  = incs.filter(i => i.status==='in_progress').length;
  const incResolved  = incs.filter(i => i.status==='resolved').length;
  const pkgActive    = pkgs.filter(p => p.status==='active');
  const hoursLeft    = pkgActive.reduce((s,p) => s+((p.totalHours||0)-(p.usedHours||0)), 0);
  const amtPending   = invs.filter(i => i.status==='sent').reduce((s,i)=>s+(i.total||0),0);
  const amtPaid      = invs.filter(i => i.status==='paid').reduce((s,i)=>s+(i.total||0),0);

  el.innerHTML = `
    <div style="margin-bottom:8px;color:#94a3b8;font-size:.9rem">
      Bienvenido/a, <strong style="color:#f1f5f9">${_clientData?.company||''}</strong>
    </div>
    <div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#475569;margin-bottom:8px;margin-top:18px">Incidencias</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
      <div class="stat-card"><div class="stat-label">⏳ Pendientes</div><div class="stat-value yellow">${incPending}</div></div>
      <div class="stat-card"><div class="stat-label">🔧 En revisión</div><div class="stat-value blue">${incProgress}</div></div>
      <div class="stat-card"><div class="stat-label">✅ Resueltas</div><div class="stat-value green">${incResolved}</div></div>
    </div>
    <div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#475569;margin-bottom:8px">Bolsas de horas activas</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
      <div class="stat-card"><div class="stat-label">Bolsas activas</div><div class="stat-value blue">${pkgActive.length}</div></div>
      <div class="stat-card"><div class="stat-label">Horas disponibles</div><div class="stat-value">${fmtHours(hoursLeft)}</div></div>
    </div>
    <div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#475569;margin-bottom:8px">Facturación</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
      <div class="stat-card"><div class="stat-label">Pendiente de pago</div><div class="stat-value yellow">${fmtEur(amtPending)}</div></div>
      <div class="stat-card"><div class="stat-label">Total pagado</div><div class="stat-value green">${fmtEur(amtPaid)}</div></div>
    </div>
    ${pkgActive.length ? `<div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#475569;margin-bottom:8px">Estado de bolsas</div>
      ${pkgActive.map(p => {
        const rem = p.totalHours - p.usedHours;
        const pct = p.totalHours > 0 ? Math.max(0,Math.min(100,(rem/p.totalHours)*100)) : 0;
        return `<div class="card" style="padding:14px 16px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <strong style="font-size:.9rem">${p.label}</strong>
            <span style="font-size:.82rem;color:#64748b">${fmtHours(rem)} de ${fmtHours(p.totalHours)} restantes</span>
          </div>
          <div class="progress-bar"><div class="progress-fill ${pct<20?'danger':pct<40?'warn':''}" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}` : ''}
  `;
}

// ── Packages ───────────────────────────────────────────────────────────────────
async function renderPackages() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="empty">Cargando...</div>';
  const snap = await db.collection('hourPackages').where('clientId','==',_clientId).orderBy('createdAt','desc').get();
  const pkgs = snap.docs.map(d => ({id:d.id,...d.data()}));
  const statusLabel = {
    active:   '<span class="badge badge-green">Activa</span>',
    pending:  '<span class="badge badge-yellow">Pendiente aprobación</span>',
    rejected: '<span class="badge badge-gray">Rechazada</span>'
  };
  el.innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
      <button class="btn btn-primary" onclick="openModal('modal-request-pkg')">+ Solicitar bolsa</button>
    </div>
    ${!pkgs.length ? '<div class="card"><div class="empty">No tienes bolsas de horas</div></div>' :
      pkgs.map(p => {
        const rem = p.totalHours - p.usedHours;
        const pct = p.totalHours > 0 ? Math.max(0,Math.min(100,(rem/p.totalHours)*100)) : 0;
        return `<div class="card" style="padding:18px 20px;margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px">
            <div>
              <strong style="font-size:1rem">${p.label}</strong>
              <div style="font-size:.78rem;color:#64748b;margin-top:2px">Desde ${fmtDate(p.createdAt)}</div>
            </div>
            ${statusLabel[p.status] || ''}
          </div>
          ${p.status === 'active' ? `
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px">
            <div style="text-align:center">
              <div style="font-size:.68rem;color:#64748b;text-transform:uppercase;margin-bottom:2px">Contratadas</div>
              <div style="font-weight:700;color:#f1f5f9">${fmtHours(p.totalHours)}</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:.68rem;color:#64748b;text-transform:uppercase;margin-bottom:2px">Consumidas</div>
              <div style="font-weight:700;color:#60a5fa">${fmtHours(p.usedHours||0)}</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:.68rem;color:#64748b;text-transform:uppercase;margin-bottom:2px">Disponibles</div>
              <div style="font-weight:700;color:${pct<20?'#f87171':pct<40?'#facc15':'#4ade80'}">${fmtHours(rem)}</div>
            </div>
          </div>
          <div class="progress-bar"><div class="progress-fill ${pct<20?'danger':pct<40?'warn':''}" style="width:${pct}%"></div></div>` : ''}
        </div>`;
      }).join('')}
  `;
}

async function submitPkgRequest() {
  const hours = parseFloat(document.getElementById('req-pkg-hours').value);
  const label = document.getElementById('req-pkg-label').value.trim() || 'Bolsa de horas';
  const notes = document.getElementById('req-pkg-notes').value.trim();
  if (!hours || hours <= 0) { alert('Indica las horas estimadas'); return; }
  await db.collection('hourPackages').add({
    clientId: _clientId, label, totalHours: hours, usedHours: 0,
    packageRate: 0, status: 'pending', invoicedPackage: false,
    notes, createdAt: FS.FieldValue.serverTimestamp()
  });
  closeModal('modal-request-pkg');
  document.getElementById('req-pkg-label').value = '';
  document.getElementById('req-pkg-hours').value = '';
  document.getElementById('req-pkg-notes').value = '';
  alert('Solicitud enviada. Tu administrador la revisará pronto.');
  renderPackages();
}

// ── Incidents ──────────────────────────────────────────────────────────────────
async function renderIncidents() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="empty">Cargando...</div>';
  const snap = await db.collection('incidents').where('clientId','==',_clientId).orderBy('date','desc').get();
  const incs = snap.docs.map(d => ({id:d.id,...d.data()}));
  if (!incs.length) { el.innerHTML = '<div class="card"><div class="empty">No tienes incidencias registradas</div></div>'; return; }

  el.innerHTML = `<div class="card"><table>
    <thead><tr><th>Fecha</th><th>Título</th><th>Horas</th><th>Estado</th><th></th></tr></thead>
    <tbody>
      ${incs.map(i => `<tr>
        <td>${fmtDate(i.date)}</td>
        <td><strong>${i.title}</strong>${i.description?`<br><small style="color:#64748b">${i.description.substring(0,80)}${i.description.length>80?'…':''}</small>`:''}</td>
        <td>${fmtHours(i.hours||0)}</td>
        <td>${incStatusBadge(i.status)}${i.packageId?' <span class="badge badge-blue" style="font-size:.68rem">📦</span>':''}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="openIncidentDetail('${i.id}')">Ver</button></td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

async function openIncidentDetail(id) {
  const snap = await db.collection('incidents').doc(id).get();
  const inc  = {id:snap.id,...snap.data()};
  const updSnap = await db.collection('incidentUpdates').where('incidentId','==',id).orderBy('date','desc').get();
  const updates = updSnap.docs.map(d => ({id:d.id,...d.data()}));
  const total   = updates.reduce((s,u) => s+(u.hours||0), 0);

  const modal = document.createElement('div');
  modal.className = 'modal-overlay open';
  modal.id = 'modal-inc-detail-temp';
  modal.innerHTML = `<div class="modal" style="width:580px">
    <div style="margin-bottom:12px">
      <h2>${inc.title}</h2>
      <div style="font-size:.8rem;color:#64748b;margin-top:3px">${fmtDate(inc.date)}</div>
    </div>
    <div style="margin-bottom:14px">${incStatusBadge(inc.status)}</div>
    ${inc.description?`<div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px;font-size:.87rem;color:#94a3b8;margin-bottom:14px">${inc.description}</div>`:''}
    ${updates.length ? `
      <div style="font-size:.72rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Tiempo trabajado — Total: ${fmtHours(total)}</div>
      ${updates.map(u => `<div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;margin-bottom:6px">
        <span style="font-weight:700;color:#60a5fa">${fmtHours(u.hours)}</span>
        <span style="color:#64748b;font-size:.8rem;margin-left:8px">${fmtDate(u.date)}</span>
        ${u.description?`<div style="font-size:.82rem;color:#94a3b8;margin-top:3px">${u.description}</div>`:''}
      </div>`).join('')}
    ` : '<div style="color:#475569;font-size:.85rem;text-align:center;padding:10px">Sin registros de tiempo todavía</div>'}
    <div class="modal-actions"><button class="btn btn-ghost" onclick="document.getElementById('modal-inc-detail-temp').remove()">Cerrar</button></div>
  </div>`;
  document.body.appendChild(modal);
}

// ── Invoices ───────────────────────────────────────────────────────────────────
async function renderInvoices() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="empty">Cargando...</div>';
  const snap = await db.collection('invoices').where('clientId','==',_clientId).orderBy('createdAt','desc').get();
  const invs = snap.docs.map(d => ({id:d.id,...d.data()}));
  if (!invs.length) { el.innerHTML = '<div class="card"><div class="empty">No tienes recibos de pago</div></div>'; return; }
  el.innerHTML = `<div class="card"><table>
    <thead><tr><th>Número</th><th>Fecha</th><th>Horas</th><th>Total</th><th>Estado</th><th></th></tr></thead>
    <tbody>
      ${invs.map(inv => `<tr>
        <td><strong>${inv.number}</strong></td>
        <td>${fmtDate(inv.date)}</td>
        <td>${fmtHours(inv.totalHours)}</td>
        <td><strong>${fmtEur(inv.total)}</strong></td>
        <td>${invStatusBadge(inv.status)}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="viewInvoice('${inv.id}')">Ver</button></td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

async function viewInvoice(id) {
  const snap = await db.collection('invoices').doc(id).get();
  const inv  = {id:snap.id,...snap.data()};
  document.getElementById('invoice-print-content').innerHTML = buildInvoiceHTML(inv, _clientData||{});
  openModal('modal-invoice-view');
}

function buildInvoiceHTML(inv, c) {

      </div>
      <div style="text-align:right">

    </div>

        <div style="font-weight:700">${c.company||'—'}</div>
        <div style="font-size:.85rem;color:#374151">${c.contact||''}</div>
        ${c.nif?`<div style="font-size:.82rem;color:#6b7280">NIF: ${c.nif}</div>`:''}
        ${c.address?`<div style="font-size:.82rem;color:#6b7280">${c.address}${c.city?', '+c.city:''}${c.postal?' '+c.postal:''}</div>`:''}
      </div>
      <div style="text-align:right">
        <div style="font-size:.68rem;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Fecha</div>
        <div style="font-weight:600">${inv.date}</div>
      </div>
    </div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:20px">
      <thead><tr style="background:#f1f5f9">
        <th style="padding:9px 12px;text-align:left;font-size:.78rem;color:#64748b;border-bottom:2px solid #e2e8f0">Concepto</th>
        <th style="padding:9px 12px;text-align:right;font-size:.78rem;color:#64748b;border-bottom:2px solid #e2e8f0">Horas</th>
        <th style="padding:9px 12px;text-align:right;font-size:.78rem;color:#64748b;border-bottom:2px solid #e2e8f0">Precio/h</th>

      </tr></thead>
      <tbody><tr>
        <td style="padding:9px 12px;border-bottom:1px solid #e2e8f0">Servicios de consultoría IT</td>
        <td style="padding:9px 12px;text-align:right;border-bottom:1px solid #e2e8f0">${fmtHours(inv.totalHours)}</td>
        <td style="padding:9px 12px;text-align:right;border-bottom:1px solid #e2e8f0">${fmtEur(inv.hourlyRate)}/h</td>
        <td style="padding:9px 12px;text-align:right;border-bottom:1px solid #e2e8f0;font-weight:600">${fmtEur(inv.subtotal)}</td>
      </tr></tbody>
    </table>
    <div style="display:flex;justify-content:flex-end">
      <div style="width:240px">
        <div style="display:flex;justify-content:space-between;padding:5px 0;font-size:.88rem"><span style="color:#6b7280">Subtotal</span><span>${fmtEur(inv.subtotal)}</span></div>
        ${inv.hasVat?`<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:.88rem"><span style="color:#6b7280">IVA 21%</span><span>${fmtEur(inv.vatAmount)}</span></div>`:''}
        <div style="display:flex;justify-content:space-between;padding:9px 0;border-top:2px solid #1e3a8a;margin-top:4px;font-weight:800;font-size:1.05rem">
          <span style="color:#1e3a8a">TOTAL</span><span style="color:#1e3a8a">${fmtEur(inv.total)}</span>
        </div>
      </div>
    </div>
    ${inv.notes?`<div style="margin-top:20px;padding:12px;background:#f8fafc;border-radius:6px;font-size:.83rem;color:#4b5563"><strong>Notas:</strong> ${inv.notes}</div>`:''}
  </div>`;
}
</script>
</body>
